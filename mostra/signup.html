<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – Mostra</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

  <div id="navbar"></div>

  <main>
    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-card__logo">
          <div class="navbar__logo-icon"><span>M</span></div>
          <span class="navbar__logo-text">Mostra</span>
        </div>

        <h1 class="auth-card__title">Create account</h1>
        <p class="auth-card__subtitle">Join Mostra and discover local brands</p>

        <form class="auth-form" id="signup-form" onsubmit="handleSignup(event)">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem">
            <div class="form-group">
              <label class="form-label" for="first-name">First name</label>
              <input type="text" id="first-name" class="input" placeholder="Ahmed" required />
            </div>
            <div class="form-group">
              <label class="form-label" for="last-name">Last name</label>
              <input type="text" id="last-name" class="input" placeholder="Ali" required />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="email">Email address</label>
            <input type="email" id="email" class="input" placeholder="you@example.com" required />
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" class="input" placeholder="Min. 8 characters" required minlength="8" />
          </div>

          <div class="form-group">
            <label class="form-label" for="confirm-password">Confirm password</label>
            <input type="password" id="confirm-password" class="input" placeholder="Repeat your password" required />
          </div>

          <label class="filter-label" style="font-size:0.8125rem;color:var(--text-secondary)">
            <input type="checkbox" required style="accent-color:var(--primary)" />
            I agree to the <a href="terms.html" class="auth-link">Terms of Service</a> and <a href="privacy.html" class="auth-link">Privacy Policy</a>
          </label>

          <button type="submit" class="btn btn-primary" style="width:100%;padding:0.75rem">
            Create Account
          </button>
        </form>

        <p class="auth-footer">
          Already have an account? <a href="login.html" class="auth-link">Sign in</a>
        </p>
      </div>
    </div>
  </main>

  <div id="footer"></div>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script>
    function handleSignup(e) {
      e.preventDefault();
      const pwd = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;
      if (pwd !== confirm) {
        alert('Passwords do not match');
        return;
      }
      const btn = e.target.querySelector('button[type=submit]');
      btn.textContent = 'Creating account...';
      btn.disabled = true;
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1000);
    }
  </script>
</body>
</html>
