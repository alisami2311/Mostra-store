<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wishlist – Mostra</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/layout.css" />
</head>
<body>
  <div id="navbar"></div>

  <main>
    <div class="page-header" style="background:var(--surface);border-bottom:1px solid var(--border);padding:2rem 0">
      <div class="container">
        <h1 style="font-size:1.875rem;font-weight:700;color:var(--text-primary)">My Wishlist</h1>
        <p style="color:var(--text-secondary);margin-top:0.5rem">Items you've saved for later</p>
      </div>
    </div>

    <div class="container" style="padding-top:2rem;padding-bottom:4rem">
      <div id="wishlist-empty" style="text-align:center; padding:4rem 0; background:var(--surface); border:1px dashed var(--border); border-radius:var(--radius-lg); margin-top:2rem;">
        <div style="font-size:4rem; margin-bottom:1rem;">❤️</div>
        <h2 style="margin-bottom:1rem; color:var(--text-primary);">Your wishlist is empty</h2>
        <p style="color:var(--text-secondary); margin-bottom:2rem;">Save items you love to your wishlist to keep track of them.</p>
        <a href="explore.html" class="btn btn-primary">Explore Products</a>
      </div>
    </div>
  </main>

  <div id="footer"></div>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
